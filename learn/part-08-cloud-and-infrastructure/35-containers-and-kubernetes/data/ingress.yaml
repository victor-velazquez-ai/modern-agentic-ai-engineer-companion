# Ingress — admits external HTTP traffic and routes it to the Service.
# This is the front door; the Service is the internal switchboard.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agent-service
spec:
  rules:
    - host: agent.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agent-service
                port:
                  number: 80
