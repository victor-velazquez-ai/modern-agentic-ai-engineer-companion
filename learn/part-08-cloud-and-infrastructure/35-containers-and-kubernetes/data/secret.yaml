# Secret — sensitive values injected at runtime (NEVER baked into the image, §35.1).
# NOTE: stringData here is a PLACEHOLDER for teaching. Real secrets come from a secret
# manager (AWS Secrets Manager, Sealed Secrets, External Secrets) — not committed YAML.
apiVersion: v1
kind: Secret
metadata:
  name: agent-secrets
type: Opaque
stringData:
  ANTHROPIC_API_KEY: REPLACE_ME_FROM_SECRET_MANAGER
  DATABASE_URL: postgresql://app:REPLACE_ME@db:5432/app
